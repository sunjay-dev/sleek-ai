version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    ports:
      - "3000:3000"
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    restart: always
    ports:
      - "5175:80"

volumes:
  redis_data:
